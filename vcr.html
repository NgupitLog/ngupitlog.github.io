<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Voucher</title>

<style>
body{font-family:Arial;background:#f4f6f8;padding:20px;margin:0}
h2{color:#0b4ea2;margin-bottom:10px}

.header,.so-block{
  background:#fff;
  padding:15px;
  border-radius:8px;
  margin-bottom:15px;
  border-left:5px solid #ff8c00;
}

label{font-size:12px;font-weight:bold}
input,select{
  width:100%;
  padding:6px;
  font-size:13px;
  box-sizing:border-box;
}

.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.col{
  flex:1;
  min-width:150px;
}

.btn{
  background:#ff8c00;
  color:#fff;
  border:none;
  padding:6px 12px;
  border-radius:5px;
  cursor:pointer;
}

.btn-blue{background:#0b4ea2}
.btn-delete{
  background:#e74c3c;
  border:none;
  color:#fff;
  border-radius:5px;
  padding:4px 8px;
  cursor:pointer;
}

table{width:100%;margin-top:10px}
th{background:#0b4ea2;color:#fff;padding:6px;font-size:12px}
td{padding:4px}

.total{margin-top:8px;font-weight:bold;font-size:13px}

/* MOBILE FIX */
@media(max-width:768px){
  table, thead, tbody, th, td, tr{display:block}
  th{display:none}
  td{margin-bottom:6px}
}
</style>
</head>

<body>

<h2>Form Voucher</h2>

<div class="header">
<div class="row">

<div class="col">
<label>Request By</label>
<select id="pic"></select>
</div>

<div class="col">
<label>Belongs To</label>
<select id="belongsTo">
<option>Ngupit</option>
<option>Paksi</option>
</select>
</div>

<div class="col">
<label>Company</label>
<input id="companySearch" placeholder="Cari company...">
<select id="companyName" size="4"></select>
</div>

</div>
</div>

<div id="soContainer"></div>

<button class="btn btn-blue" id="btnAddSO">+ Tambah VCR</button>
<br><br>
<button class="btn" id="btnSubmit">SUBMIT</button>

<script>
const API = "https://script.google.com/macros/s/AKfycbyxSOBF9tj7OioIOinTW-t0CTw0Sflx0JYXetseJKAJ6VxYbCi8RtE79p8_bJfj_aTyLQ/exec";

let companyList=[];

/* LOAD PIC */
fetch(API+"?type=pic")
.then(r=>r.json())
.then(d=>{
  d.forEach(v=>{
    pic.innerHTML+=`<option>${v}</option>`;
  });
});

/* LOAD COMPANY */
fetch(API+"?type=company")
.then(r=>r.json())
.then(d=>{
  companyList=d;
  renderCompany(d);
});

function renderCompany(list){
  companyName.innerHTML="";
  list.forEach(v=>{
    companyName.innerHTML+=`<option>${v}</option>`;
  });
}

/* SEARCH COMPANY */
companySearch.oninput=()=>{
  const f=companyList.filter(c=>c.toLowerCase().includes(companySearch.value.toLowerCase()));
  renderCompany(f);
};

/* PILIH COMPANY → LOAD SO */
companyName.onchange=()=>{
  companySearch.value=companyName.value;
  loadSO();
};

/* LOAD SO GLOBAL */
function loadSO(){
  const company = companySearch.value.trim();
  if(!company) return;

  fetch(API+"?type=so&company="+encodeURIComponent(company))
  .then(r=>r.json())
  .then(d=>{
    document.querySelectorAll(".soNumber").forEach(select=>{
      select.innerHTML="<option value=''>-- pilih SO --</option>";
      d.forEach(v=>{
        select.innerHTML+=`<option>${v}</option>`;
      });
    });
  });
}

/* ADD SO */
function addSO(){
  const el=document.createElement("div");
  el.className="so-block";

  el.innerHTML=`
  <button class="btn-delete">🗑</button>

  <div class="row">
    <div class="col">
      <label>SO Number</label>
      <select class="soNumber"></select>
    </div>

    <div class="col">
      <label>BL</label>
      <input class="bl" readonly>
    </div>

    <div class="col">
      <label>AJU</label>
      <input class="aju">
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Tujuan</th>
        <th>Bank</th>
        <th>No Rek</th>
        <th>Atas Nama</th>
        <th>Berita</th>
        <th>Nominal</th>
        <th></th>
      </tr>
    </thead>
    <tbody class="items"></tbody>
  </table>

  <button class="btn addItem">+ Tambah Biaya</button>
  <div class="total">Total: Rp <span>0</span></div>
  `;

  soContainer.appendChild(el);

  const soSelect = el.querySelector(".soNumber");
  const blInput = el.querySelector(".bl");

  /* AUTO BL */
  soSelect.onchange=()=>{
    fetch(API+"?type=detail&so="+encodeURIComponent(soSelect.value))
    .then(r=>r.json())
    .then(d=>{
      blInput.value=d.bl||"";
    });
  };

  el.querySelector(".btn-delete").onclick=()=>el.remove();
  el.querySelector(".addItem").onclick=()=>addItem(el);

  addItem(el);
}

/* ADD ITEM */
function addItem(parent){
  const tr=document.createElement("tr");

  tr.innerHTML=`
  <td>
    <select class="tujuan">
      <option>Admin DO</option><option>DO</option><option>Extend DO</option>
      <option>SPDO</option><option>Behandle</option><option>Storage</option>
      <option>Extend Storage</option><option>Temporary Storage</option>
      <option>LOLO</option><option>Handling</option>
      <option>Handling SPJM</option><option>Handling Fumigasi</option>
      <option>Undername</option><option>Coordination Fee</option>
      <option>Trucking</option><option>Repair Container</option>
    </select>
  </td>

  <td>
    <select class="bank">
      <option>BCA</option><option>BRI</option><option>BNI</option>
      <option>BSI</option><option>Mandiri</option><option>Virtual Account</option>
      <option>CIMB</option><option>Maybank</option><option>Citibank</option>
      <option>Danamon</option><option>HSBC</option><option>Panin</option>
      <option>UOB</option><option>OCBC</option><option>MUFG</option>
      <option>Standard Chartered</option><option>Deutsche</option>
      <option>JAGO</option>
    </select>
  </td>

  <td><input class="rek"></td>
  <td><input class="nama"></td>
  <td><input class="berita"></td>
  <td><input type="number" class="nominal" value="0"></td>
  <td><button class="btn-delete">X</button></td>
  `;

  parent.querySelector(".items").appendChild(tr);

  tr.querySelector(".rek").oninput=e=>{
    e.target.value=e.target.value.replace(/[^0-9]/g,'');
  };

  tr.querySelector(".nominal").oninput=()=>calc(parent);
  tr.querySelector(".btn-delete").onclick=()=>{
    tr.remove();
    calc(parent);
  };
}

function calc(parent){
  let t=0;
  parent.querySelectorAll(".nominal").forEach(i=>{
    t+=Number(i.value||0);
  });
  parent.querySelector(".total span").innerText=t.toLocaleString("id-ID");
}

/* SUBMIT */
btnSubmit.onclick=()=>{
  const data={
    pic:pic.value,
    belongsTo:belongsTo.value,
    companyName:companySearch.value,
    soList:[]
  };

  document.querySelectorAll(".so-block").forEach(so=>{
    const items=[];

    so.querySelectorAll(".items tr").forEach(r=>{
      items.push({
        jenisBiaya:r.querySelector(".tujuan").value,
        bank:r.querySelector(".bank").value,
        rek:r.querySelector(".rek").value,
        nama:r.querySelector(".nama").value,
        berita:r.querySelector(".berita").value,
        nominal:Number(r.querySelector(".nominal").value||0)
      });
    });

    data.soList.push({
      soNumber:so.querySelector(".soNumber").value,
      bl:so.querySelector(".bl").value,
      aju:so.querySelector(".aju").value,
      items
    });
  });

  fetch(API,{
    method:"POST",
    body:JSON.stringify(data)
  })
  .then(()=>{alert("BERHASIL");location.reload();});
};

btnAddSO.onclick=addSO;
addSO();
</script>

</body>
</html>
