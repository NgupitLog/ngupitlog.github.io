<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Voucher</title>

<style>
body{font-family:Arial;background:#f4f6f8;padding:20px}
h2{color:#0b4ea2}
.header,.so-block{background:#fff;padding:15px;border-radius:6px;margin-bottom:20px;border-left:5px solid #ff8c00}
label{font-size:13px;font-weight:bold}
input,select{width:100%;padding:6px;margin-bottom:6px;font-size:13px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.col{flex:1}
table{width:100%;border-collapse:collapse;margin-top:10px}
th{background:#0b4ea2;color:#fff;padding:6px}
td{padding:6px}
.btn{background:#ff8c00;color:#fff;border:none;padding:6px 12px;border-radius:4px;cursor:pointer}
.btn-blue{background:#0b4ea2}
.btn-danger{background:#e74c3c}
.total{margin-top:8px;font-weight:bold}
</style>
</head>

<body>

<h2>Form Voucher</h2>

<div class="header">
  <div class="row">

    <div class="col">
      <label>PIC</label>
      <select id="pic"></select>
    </div>

    <div class="col">
      <label>Belongs To</label>
      <select id="belongsTo">
        <option>Ngupit</option>
        <option>Paksi</option>
      </select>
    </div>

    <div class="col">
      <label>Company</label>
      <select id="company"></select>
    </div>

  </div>
</div>

<div id="soContainer"></div>

<button class="btn btn-blue" id="btnAddSO">+ Tambah SO</button>
<br><br>
<button class="btn" id="btnSubmit">SUBMIT</button>

<script>
const API = "https://script.google.com/macros/s/AKfycbz95w91CTqduhGUKyRvaGP70hqU7eWwdAUdMj5D7-cuwpTnzfY2eZ4lKdldgtJJf3rldw/exec";

const pic = document.getElementById("pic");
const company = document.getElementById("company");
const soContainer = document.getElementById("soContainer");

/* LOAD PIC */
fetch(API + "?type=pic")
.then(r=>r.json())
.then(d=>d.forEach(v=>pic.innerHTML+=`<option>${v}</option>`));

/* LOAD COMPANY */
fetch(API + "?type=company")
.then(r=>r.json())
.then(d=>d.forEach(v=>company.innerHTML+=`<option>${v}</option>`));

/* ADD SO BLOCK */
function addSO(){
  const el=document.createElement("div");
  el.className="so-block";

  el.innerHTML=`
    <button class="btn btn-danger" style="float:right">HAPUS</button>
    <h3>Detail SO</h3>

    <div class="row">
      <div class="col">
        <label>SO Number</label>
        <select class="soNumber"></select>
      </div>

      <div class="col">
        <label>BL</label>
        <input class="bl" readonly>
      </div>

      <div class="col">
        <label>AJU</label>
        <input class="aju">
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Jenis Biaya</th>
          <th>Nominal</th>
          <th></th>
        </tr>
      </thead>
      <tbody class="items"></tbody>
    </table>

    <button class="btn addItem">+ Tambah Biaya</button>
    <div class="total">Total: Rp <span>0</span></div>
  `;

  soContainer.appendChild(el);

  const soSelect = el.querySelector(".soNumber");
  const blInput = el.querySelector(".bl");

  /* LOAD SO BASED ON COMPANY */
  function loadSO(){
    fetch(API + "?type=so&company=" + company.value)
    .then(r=>r.json())
    .then(list=>{
      soSelect.innerHTML="";
      list.forEach(v=>{
        soSelect.innerHTML += `<option>${v}</option>`;
      });
    });
  }

  loadSO();

  /* CHANGE COMPANY → reload SO */
  company.onchange = loadSO;

  /* SELECT SO → AUTO BL */
  soSelect.onchange = ()=>{
    fetch(API + "?type=detail&so=" + soSelect.value)
    .then(r=>r.json())
    .then(d=>{
      blInput.value = d.bl || "";
    });
  };

  el.querySelector(".btn-danger").onclick=()=>el.remove();
  el.querySelector(".addItem").onclick=()=>addItem(el);

  addItem(el);
}

/* ADD ITEM */
function addItem(so){
  const tr=document.createElement("tr");
  tr.innerHTML=`
    <td>
      <select class="jenisBiaya">
        <option>Admin DO</option>
        <option>Trucking</option>
        <option>Storage</option>
        <option>Handling</option>
      </select>
    </td>
    <td><input type="number" class="nominal" value="0"></td>
    <td><button class="btn btn-danger">X</button></td>
  `;

  so.querySelector(".items").appendChild(tr);

  tr.querySelector(".nominal").oninput=()=>calc(so);
  tr.querySelector("button").onclick=()=>{
    tr.remove();
    calc(so);
  };
}

/* TOTAL */
function calc(so){
  let total=0;
  so.querySelectorAll(".nominal").forEach(i=>{
    total+=Number(i.value||0);
  });
  so.querySelector(".total span").innerText=total.toLocaleString("id-ID");
}

/* SUBMIT */
document.getElementById("btnSubmit").onclick=()=>{
  const data={
    pic:pic.value,
    belongsTo:document.getElementById("belongsTo").value,
    companyName:company.value,
    soList:[]
  };

  document.querySelectorAll(".so-block").forEach(so=>{
    const items=[];
    so.querySelectorAll(".items tr").forEach(r=>{
      items.push({
        jenisBiaya:r.querySelector(".jenisBiaya").value,
        nominal:Number(r.querySelector(".nominal").value||0)
      });
    });

    data.soList.push({
      soNumber:so.querySelector(".soNumber").value,
      bl:so.querySelector(".bl").value,
      items
    });
  });

  fetch(API,{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify(data)
  }).then(()=>{
    alert("Berhasil");
    location.reload();
  });
};

document.getElementById("btnAddSO").onclick=addSO;
addSO();

</script>
</body>
</html>
