<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Form Pengajuan VCR</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }
    .container {
      background: white;
      padding: 20px;
      border-left: 6px solid orange;
      max-width: 900px;
      margin: auto;
    }
    h2 {
      color: #1f4e79;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }
    button {
      margin-top: 15px;
      padding: 10px 20px;
      background: orange;
      border: none;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Form Pengajuan VCR</h2>

  <label>PIC</label>
  <select id="pic"></select>

  <label>Company</label>
  <input type="text" id="company">

  <label>SO Number</label>
  <select id="so"></select>

  <label>BL</label>
  <input type="text" id="bl">

  <label>No AJU</label>
  <input type="text" id="aju">

  <label>Tujuan</label>
  <select id="tujuan">
    <option>Admin DO</option>
    <option>Operational</option>
  </select>

  <label>Bank</label>
  <select id="bank">
    <option>BCA</option>
    <option>Mandiri</option>
  </select>

  <label>No Rekening</label>
  <input type="text" id="rek">

  <label>Atas Nama</label>
  <input type="text" id="nama">

  <label>Berita</label>
  <input type="text" id="berita">

  <label>Nominal</label>
  <input type="number" id="nominal">

  <button onclick="submitForm()">SUBMIT</button>

</div>

<script>

// 🔹 GANTI URL INI DENGAN WEB APP APPS SCRIPT
const API_URL = "https://script.google.com/macros/s/AKfycbzf40h7PGczXpiq87qRirmRj10GMhhJ7CuU7s5kzeV0ZDB7Us34cF8IEkzpgtoCuOJZJQ/exec";

// LOAD DATA MASTER
fetch(API_URL + "?action=getMaster")
.then(res => res.json())
.then(data => {

  let picSelect = document.getElementById("pic");
  let soSelect = document.getElementById("so");

  let pics = [...new Set(data.map(d => d.pic))];
  let sos = [...new Set(data.map(d => d.so))];

  pics.forEach(p => {
    let opt = document.createElement("option");
    opt.value = p;
    opt.text = p;
    picSelect.add(opt);
  });

  sos.forEach(s => {
    let opt = document.createElement("option");
    opt.value = s;
    opt.text = s;
    soSelect.add(opt);
  });

});

// SUBMIT
function submitForm() {

  let data = {
    pic: document.getElementById("pic").value,
    company: document.getElementById("company").value,
    so: document.getElementById("so").value,
    bl: document.getElementById("bl").value,
    aju: document.getElementById("aju").value,
    tujuan: document.getElementById("tujuan").value,
    bank: document.getElementById("bank").value,
    rek: document.getElementById("rek").value,
    nama: document.getElementById("nama").value,
    berita: document.getElementById("berita").value,
    nominal: document.getElementById("nominal").value
  };

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(res => {
    alert("Berhasil submit!");
    location.reload();
  });

}

</script>

</body>
</html>
