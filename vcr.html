<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Form Pengajuan VCR</title>

<style>
body{
  font-family:Arial;
  background:#f4f6f8;
  padding:20px;
}

h2{
  color:#0b4ea2;
}

.container{
  background:#fff;
  padding:15px;
  border-left:6px solid orange;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#0b4ea2;
  color:#fff;
  padding:8px;
}

td{
  padding:6px;
}

input,select{
  width:100%;
  padding:5px;
}

.btn{
  background:orange;
  color:#fff;
  border:none;
  padding:10px;
  margin-top:10px;
  cursor:pointer;
}

</style>
</head>

<body>

<h2>Form Pengajuan VCR</h2>

<div class="container">

<table>
<tr>
  <td>PIC</td>
  <td><select id="pic"></select></td>

  <td>Belong To</td>
  <td>
    <select id="belongs">
      <option>Ngupit</option>
      <option>Paksi</option>
    </select>
  </td>
</tr>

<tr>
  <td>Company</td>
  <td><select id="company"></select></td>

  <td>SO Number</td>
  <td><select id="so"></select></td>
</tr>

<tr>
  <td>BL</td>
  <td><input id="bl" readonly></td>

  <td>No AJU</td>
  <td><input id="aju" readonly></td>
</tr>

<tr>
  <td>Tujuan</td>
  <td>
    <select id="tujuan">
      <option>Admin DO</option>
      <option>DO</option>
      <option>Extend DO</option>
      <option>Storage</option>
      <option>LOLO</option>
      <option>Handling</option>
      <option>Trucking</option>
    </select>
  </td>

  <td>Bank</td>
  <td>
    <select id="bank">
      <option>BCA</option>
      <option>BRI</option>
      <option>Mandiri</option>
      <option>BNI</option>
    </select>
  </td>
</tr>

<tr>
  <td>No Rekening</td>
  <td><input id="rek"></td>

  <td>Atas Nama</td>
  <td><input id="nama"></td>
</tr>

<tr>
  <td>Berita</td>
  <td colspan="3"><input id="berita"></td>
</tr>

<tr>
  <td>Nominal</td>
  <td><input id="nominal"></td>
</tr>

</table>

<button class="btn" onclick="submitData()">SUBMIT</button>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzDGUYXoto4HpHLkvbMt_lvMZgBtzGxQE6BSbiyFD0BypNioJ7HMMwjflRX5UyC9RRhig/exec";

// LOAD PIC
fetch(URL+"?type=pic")
.then(r=>r.json())
.then(d=>{
  d.forEach(v=>{
    pic.innerHTML+=`<option>${v}</option>`;
  });
});

// LOAD COMPANY
fetch(URL+"?type=company")
.then(r=>r.json())
.then(d=>{
  d.forEach(v=>{
    company.innerHTML+=`<option>${v}</option>`;
  });
});

// LOAD SO
company.onchange=()=>{
  fetch(URL+`?type=so&company=${company.value}`)
  .then(r=>r.json())
  .then(d=>{
    so.innerHTML="";
    d.forEach(v=>{
      so.innerHTML+=`<option>${v}</option>`;
    });
  });
};

// LOAD DETAIL
so.onchange=()=>{
  fetch(URL+`?type=detail&so=${so.value}`)
  .then(r=>r.json())
  .then(d=>{
    bl.value=d.bl;
    aju.value=d.aju;
  });
};

// SUBMIT
function submitData(){
  fetch(URL,{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify({
      pic:pic.value,
      belongs:belongs.value,
      company:company.value,
      so:so.value,
      bl:bl.value,
      aju:aju.value,
      tujuan:tujuan.value,
      bank:bank.value,
      rek:rek.value,
      nama:nama.value,
      berita:berita.value,
      nominal:nominal.value
    })
  });

  alert("Berhasil kirim");
  location.reload();
}

</script>

</body>
</html>
